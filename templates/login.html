<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema Cámaras UFRO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Estilos para los logos */
        .logo-side {
            max-height: 120px;
            width: auto;
            filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.2));
            transition: transform 0.3s ease;
        }
        
        .logo-side:hover {
            transform: scale(1.1);
        }
        
        /* Layout con logos a los lados */
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
        }
        
        /* Logo a la izquierda */
        .logo-left-container {
            margin-right: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* Logo a la derecha */
        .logo-right-container {
            margin-left: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* Formulario central */
        .login-form-wrapper {
            background: white;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.12);
            overflow: hidden;
            border: 2px solid rgba(0,0,0,0.05);
        }
        
        .login-form-card {
            padding: 50px;
            min-width: 400px;
        }
        
        /* Responsivo */
        @media (max-width: 768px) {
            .login-form-card {
                min-width: 300px;
                padding: 30px;
            }
            .logo-side {
                max-height: 80px;
            }
            .logo-left-container {
                margin-right: 20px;
            }
            .logo-right-container {
                margin-left: 20px;
            }
        }
        
        @media (max-width: 992px) {
            .login-container {
                flex-direction: column;
                text-align: center;
            }
            .logo-left-container,
            .logo-right-container {
                margin: 20px 0;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <!-- Logo izquierdo -->
        <div class="logo-left-container">
            <img src="{{ url_for('static', filename='images/logo-ufro.png') }}" alt="Universidad de La Frontera" class="logo-side">
        </div>

        <!-- Formulario de login central -->
        <div class="login-form-wrapper">
            <div class="login-form-card">
                <div class="text-center mb-4">
                    <i class="fas fa-video fa-3x text-primary mb-3"></i>
                    <h3 class="card-title">Sistema Cámaras UFRO</h3>
                    <p class="text-muted">Iniciar Sesión</p>
                </div>
                
                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, message in messages %}
                            <div class="alert alert-{{ 'danger' if category == 'error' else 'success' if category == 'success' else 'info' }}" role="alert">
                                {{ message }}
                            </div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}
                
                <form method="POST" action="{{ url_for('login') }}">
                    <div class="mb-3">
                        <label for="username" class="form-label">Usuario o Email</label>
                        <input type="text" class="form-control" id="username" name="username" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Contraseña</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="fas fa-sign-in-alt"></i> Iniciar Sesión
                    </button>
                </form>
                
                <div class="text-center mt-3">
                    <small class="text-muted">
                        Universidad de La Frontera<br>
                        Sistema de Gestión de Cámaras
                    </small>
                </div>
            </div>
        </div>

        <!-- Logo derecho -->
        <div class="logo-right-container">
            <img src="{{ url_for('static', filename='images/logo_cctv.png') }}" alt="Sistema CCTV" class="logo-side">
        </div>
    </div>
</body>
</html>
